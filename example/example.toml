# example/example.toml — self-contained Femto demo configuration
#
# Listens on port 8443 (TCP + QUIC) using a self-signed certificate for
# localhost / 127.0.0.1 / ::1.
#
# Run from the project root:
#
#   make static
#   ./femto -config example/example.toml
#
# Then visit:
#   https://localhost:8443
#
# Your browser will warn about the self-signed certificate — that is expected.
# To skip the warning use curl:
#   curl --insecure https://localhost:8443/

[server]
listen = ["127.0.0.1:8443"]   # local only; change to "0.0.0.0:443" in production

# Logging: "" or "stderr" = write to stderr, "off" = discard, or a file path.
access_log = ""
error_log  = ""

read_header_timeout = "5s"
read_timeout        = "15s"
write_timeout       = "30s"
idle_timeout        = "60s"
shutdown_timeout    = "5s"

max_header_bytes = 65536
max_connections  = 64      # low cap; suitable for a local demo or embedded device

[server.security]
hsts                    = "max-age=63072000; includeSubDomains; preload"
content_type_options    = "nosniff"
frame_options           = "DENY"
content_security_policy = "default-src 'self'"
referrer_policy         = "strict-origin-when-cross-origin"
permissions_policy      = ""

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (optional)
# Bind a plain HTTP port and issue 301 redirects to the HTTPS equivalent.
# ---------------------------------------------------------------------------
# [server.redirect]
# enabled = true
# listen  = ["80"]   # defaults to ["80"] if omitted

# ---------------------------------------------------------------------------
# Unix domain socket (optional)
# Exposes a plain HTTP/1.1 listener on a Unix socket, intended for a local
# reverse-proxy or inter-process communication without TLS overhead.
# ---------------------------------------------------------------------------
# [server.unix]
# enabled = true
# path    = "/run/femto/femto.sock"
# mode    = 0660

# ---------------------------------------------------------------------------
# Virtual host — localhost
# Matches: localhost, 127.0.0.1, ::1
# Document root: example/www/localhost/
# Certificates:  example/certs/localhost.{crt,key}  (self-signed, dev only)
# ---------------------------------------------------------------------------
[[vhost]]
server_names  = ["localhost"]
document_root = "example/www/localhost"
dir_listing   = false
index_files   = ["index.html"]
cache_max_age = "1h"

  [vhost.tls]
  cert = "example/certs/localhost.crt"
  key  = "example/certs/localhost.key"
